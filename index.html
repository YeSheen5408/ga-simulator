<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GA 練牌模擬器 v5.0 - 英雄升級系統</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ffca28;
            --memory-color: #29b6f6;
            --material-color: #ec407a;
            --champion-color: #ab47bc;
            --text-color: #ffffff;
            --border-color: #333333;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h3 { margin: 5px 0; color: var(--accent-color); text-align: center; }
        .game-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        .zone { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #222;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
        }

        .card-display-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 0;
            min-height: 50px;
            align-items: center;
        }

        /* 英雄專用卡牌樣式 */
        .champ-card {
            background-color: #311b92;
            border: 2px solid var(--champion-color);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 10px var(--champion-color);
        }

        .card-item {
            min-width: 90px;
            height: 120px;
            background-color: #2a2a2a;
            border: 2px solid var(--accent-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
            font-size: 11px;
            text-align: center;
        }
        .card-cost { text-align: right; font-weight: bold; color: var(--memory-color); }
        .card-name { font-weight: bold; margin: 5px 0; }
        .card-action-btn {
            background: var(--memory-color);
            color: #000;
            font-size: 9px;
            border: none;
            border-radius: 3px;
            padding: 2px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        
        textarea {
            width: 100%;
            height: 100px;
            background: #000;
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 12px;
            padding: 5px;
            box-sizing: border-box;
        }

        .log-box {
            background-color: #000;
            color: #00ff00;
            padding: 8px;
            height: 90px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            border-radius: 6px;
        }

        /* 彈出視窗(Material Deck 選擇器) */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e1e1e;
            border: 2px solid var(--material-color);
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            width: 85%;
            max-width: 400px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.7);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 99;
        }
        .modal-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }
        .modal-item {
            background: #2a2a2a;
            padding: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>GA 模擬器 (英雄升級版)</h1>

        <div class="zone">
            <h3>1. 牌組匯入</h3>
            <textarea id="deck-input" placeholder="在此貼上 B 列表文字..."></textarea>
            <div class="btn-group">
                <button class="btn" onclick="importDeck()">解析並載入牌組</button>
                <button class="btn" style="background:#555; color:#fff;" onclick="startGame()">洗牌並開始</button>
            </div>
        </div>

        <div class="zone" style="border-color: var(--champion-color);">
            <h3>👑 戰場上的 Champion</h3>
            <div class="champ-card">
                <div style="font-size: 12px; color: var(--champion-color); font-weight: bold;">CURRENT HERO</div>
                <div id="current-champ-name" style="font-size: 18px; font-weight: bold; margin: 5px 0;">尚未覺醒 (Lv 0)</div>
                <div style="font-size: 12px; color: #aaa;">生命值 (Lineage): <span id="player-hp">20</span></div>
            </div>
            <div class="btn-group" style="margin-top: 10px;">
                <button class="btn" style="background-color: var(--material-color); color: white;" onclick="openMaterialModal()">打開 Material Deck (升級)</button>
            </div>
        </div>

        <div class="status-bar" style="border-left: 4px solid var(--memory-color);">
            <span style="color: var(--memory-color); font-weight: bold;">🔮 可用 Memory: <span id="current-memory">0</span></span>
            <span>🎴 Main 剩餘: <b id="main-count">0</b> | 💎 Material 剩餘: <b id="material-count">0</b></span>
        </div>
