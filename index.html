<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GA 專業練牌模擬器 - 流程還原版</title>
    <style>
        :root {
            --bg-color: #0d0d11;
            --card-bg: #16161a;
            --accent-color: #ffca28;
            --memory-color: #29b6f6;
            --material-color: #ec407a;
            --champion-color: #ab47bc;
            --enemy-color: #ff5252;
            --text-color: #ffffff;
            --border-color: #2a2a35;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h3 { margin: 5px 0; color: var(--accent-color); text-align: center; font-size: 16px; }
        .game-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        .zone { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .battle-status { display: flex; justify-content: space-between; gap: 10px; }
        .status-box { flex: 1; padding: 8px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 13px; }

        .card-display-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0;
            min-height: 100px;
            align-items: center;
        }

        .champ-view-container { display: flex; justify-content: center; align-items: center; margin: 5px 0; }
        
        .champ-img-box {
            width: 110px;
            height: 140px;
            border-radius: 8px;
            border: 2px solid var(--champion-color);
            background: linear-gradient(135deg, #2a1a3a 0%, #150d22 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-wrapper {
            position: relative;
            min-width: 105px;
            width: 105px;
            height: 145px;
            border-radius: 8px;
            background: linear-gradient(135deg, #2c2c35 0%, #1a1a24 100%);
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
            box-sizing: border-box;
            transition: transform 0.2s;
        }

        /* 🔄 橫置資源樣式 */
        .card-wrapper.rested {
            border-color: #555;
            opacity: 0.5;
            background: #111;
        }
        .rested-tag {
            background: #ff5252; color: #fff; font-size: 8px; padding: 1px 3px; border-radius: 3px; position: absolute; top: 4px; right: 4px;
        }

        .card-overlay-actions {
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
            margin-top: auto;
        }
        .card-overlay-btn {
            background: rgba(255,255,255,0.15); color: #fff; font-size: 10px;
            border: none; border-radius: 4px; padding: 3px 0; cursor: pointer; font-weight: bold; text-align: center;
        }
        .card-overlay-btn.play { background: rgba(76, 175, 80, 0.85); }

        .btn {
            background-color: var(--accent-color); color: #000; border: none;
            padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer;
        }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        
        textarea {
            width: 100%; height: 60px; background: #050508; color: #fff;
            border: 1px solid var(--border-color); border-radius: 6px; font-size: 12px; padding: 5px; box-sizing: border-box;
        }

        .log-box {
            background-color: #050508; color: #00ff00; padding: 8px; height: 110px;
            overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 6px; border: 1px solid var(--border-color);
        }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); border: 2px solid var(--material-color); padding: 15px; border-radius: 12px; z-index: 100; width: 85%; max-width: 400px;
        }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
        .modal-list { max-height: 250px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        
        .modal-card-item { 
            width: 80px; height: 112px; border-radius: 6px; cursor: pointer; border: 2px solid var(--material-color); 
            background: linear-gradient(135deg, #3a2a3a 0%, #201520 100%); display: flex; flex-direction: column; justify-content: space-between; padding: 6px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>GA 流程還原模擬器 v14.0</h1>

        <div class="zone">
            <textarea id="deck-input" placeholder="在此貼上 ShoutAtYourDecks 的 B 列表文字..."></textarea>
            <div class="btn-group">
                <button class="btn" onclick="importDeck()">解析並載入</button>
                <button class="btn" style="background:#444; color:#fff;" onclick="startGame()">洗牌並開始遊戲</button>
            </div>
        </div>

        <div class="battle-status">
            <div class="status-box" style="background: #221212; border: 1px solid var(--enemy-color); color: var(--enemy-color);">
                ⚔️ AI 對手狀態
                <div style="font-size: 11px; font-weight: normal; color:#aaa; margin-top:2px;">血量/生命值值不受打牌連動，手動模擬對局</div>
            </div>
            <div class="status-box" style="background: #112211; border: 1px solid #4caf50; color: #4caf50;">
                ⏱️ 當前遊戲階段
                <div id="game-phase-text" style="font-size: 12px; color: var(--accent-color); margin-top:2px;">未開始</div>
            </div>
        </div>

        <div class="zone" style="border-color: var(--champion-color);">
            <h3>👑 戰場 (Battlefield / Field Zone)</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="champ-img-box" id="champ-block-display">
                    <div style="font-size: 12px; font-weight: bold; color: var(--champion-color);">未召喚</div>
                </div>
                <div style="flex: 1;">
                    <div style="font-size: 11px; color: #aaa; margin-bottom: 4px;">已登場的 Allies / Regalia:</div>
                    <div class="card-display-container" id="field-zone-display" style="min-height: 80px; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 4px;">
                        <span style="color:#444; font-size:11px;">場上沒有卡片</span>
                    </div>
                </div>
            </div>
            <div class="btn-group" style="margin-top: 8px;">
                <button class="btn" id="material-btn" style="background-color: var(--material-color); color: white; padding: 5px 10px; font-size: 11px;" onclick="openMaterialModal()" disabled>1. 執行 Materialize (每回合限一次)</button>
            </div>
        </div>

        <div class="zone">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>🎴 你的手牌 (Hand)</h3>
                <button class="btn" id="end-turn-btn" style="background: #ff9800; padding: 4px 10px; font-size: 12px;" onclick="endPlayerTurn()" disabled>🛑 結束主要階段</button>
            </div>
            <div class="card-display-container" id="player-hand-display">
                <span style="color:#555; font-size:11px;">請先載入並開始遊戲</span>
            </div>
            <div class="btn-group">
                <button class="btn" id="draw-btn" style="font-size: 12px; padding: 5px 10px;" onclick="playerDrawCard()" disabled>抽一張卡 (Main: <span id="main-count">0</span>)</button>
            </div>
        </div>

        <div class="zone" style="border-color: var(--memory-color);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>🔮 Memory 區 (可用: <span id="ready-memory-count">0</span> / 總量: <span id="total-memory-count">0</span>)</h3>
                <span style="font-size: 10px; color: var(--memory-color);">打牌時會自動橫置（Rest）這裡的卡</span>
            </div>
            <div class="card-display-container" id="memory-zone-display" style="min-height: 85px;">
                <span style="color:#555; font-size:11px;">空</span>
            </div>
        </div>

        <div class="zone">
            <div class="log-box" id="game-log">系統準備就緒。</div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeMaterialModal()"></div>
    <div class="modal" id="material-modal">
        <h3 style="color: var(--material-color); margin: 0; font-size:14px;">選擇要 Materialize 的卡片</h3>
        <p style="font-size: 10px; color: #aaa; margin: 4px 0;">注意：這會自動將你 Memory 區內的所有卡片「重置為 Ready 狀態」！</p>
        <div class="modal-list" id="material-list-container"></div>
        <button class="btn" style="background:#444; color:#fff; width:100%; margin-top:10px; font-size:12px;" onclick="closeMaterialModal()">取消</button>
    </div>

    <script>
        const cardDatabase = {
            "Spirit of Water": { name: "Spirit of Water", cost: 0, id: "DOA068" },
            "Alice, Golden Queen": { name: "Alice, Golden Queen", cost: 1, id: "DOA001" },
            "Alice, Whim's Monarch": { name: "Alice, Whim's Monarch", cost: 1, id: "DOA003" },
            "Alice, Trifle's Royalty": { name: "Alice, Trifle's Royalty", cost: 1, id: "DOA002" },
            "Dropped Band": { name: "Dropped Band", cost: 0, id: "DOA122" },
            "Fire Resonance Bauble": { name: "Fire Resonance Bauble", cost: 0, id: "DOA121" },
            "Grand Crusader's Ring": { name: "Grand Crusader's Ring", cost: 1, id: "FTC134" },
            "Lagomorph Piece": { name: "Lagomorph Piece", cost: 0, id: "FTC137" },
            "Prismspire Scepter": { name: "Prismspire Scepter", cost: 1, id: "DOA130" },
            "Spellward Scepter": { name: "Spellward Scepter", cost: 1, id: "DOA134" },
            "Tariff Ring": { name: "Tariff Ring", cost: 0, id: "FTC142" },
            "Water Resonance Bauble": { name: "Water Resonance Bauble", cost: 0, id: "DOA136" },
            "Castling": { name: "Castling", cost: 1, id: "FTC047" },
            "Field of Ranks and Files": { name: "Field of Ranks and Files", cost: 1, id: "FTC031" },
            "Golden Bishop": { name: "Golden Bishop", cost: 2, id: "FTC033" },
            "Golden Checkmate": { name: "Golden Checkmate", cost: 3, id: "FTC032" },
            "Golden Gambit": { name: "Golden Gambit", cost: 1, id: "FTC048" },
            "Golden Pawn": { name: "Golden Pawn", cost: 0, id: "FTC034" },
            "Golden Rook": { name: "Golden Rook", cost: 3, id: "FTC035" },
            "March On": { name: "March On", cost: 1, id: "FTC039" },
            "Queen's Gambit": { name: "Queen's Gambit", cost: 2, id: "FTC042" },
            "Sacrifice Play": { name: "Sacrifice Play", cost: 1, id: "FTC044" },
            "Summon Pawn": { name: "Summon Pawn", cost: 1, id: "FTC046" },
            "Castling Boon": { name: "Castling Boon", cost: 1, id: "FTC030" },
            "Doubled Pawns": { name: "Doubled Pawns", cost: 1, id: "FTC050" },
            "Hunt, Weiss King": { name: "Hunt, Weiss King", cost: 4, id: "FTC052" },
            "Lily, Marine Castellan": { name: "Lily, Marine Castellan", cost: 2, id: "DOA076" },
            "Song of Frost": { name: "Song of Frost", cost: 2, id: "DOA088" },
            "Weiss Bishop": { name: "Weiss Bishop", cost: 2, id: "FTC056" }
        };

        let mainDeck = []; let materialDeck = []; let playerHand = []; 
        let memoryZone = []; // 裡面存放物件 { cardKey: string, isRested: boolean }
        let fieldZone = [];
        let hasMaterializedThisTurn = false;
        let currentPhase = "未開始"; // "Materialization", "Main", "MemoryReserve"

        const logBox = document.getElementById('game-log');
        function log(msg) { logBox.innerHTML += "<br>> " + msg; logBox.scrollTop = logBox.scrollHeight; }

        function getCardFromDatabase(cardKey) {
            if (!cardKey) return null;
            let cleanedKey = cardKey.split('(')[0].trim();
            let lowerKey = cleanedKey.toLowerCase();
            for (let dbKey in cardDatabase) {
                if (dbKey.toLowerCase() === lowerKey) return cardDatabase[dbKey];
            }
            return null;
        }

        function importDeck() {
            try {
                const text = document.getElementById('deck-input').value.trim();
                if (!text) { alert('請貼入文字！'); return; }
                mainDeck = []; materialDeck = [];
                let currentMode = "";
                const lines = text.split('\n');
                
                lines.forEach(line => {
                    let trimmed = line.trim();
                    if (!trimmed) return;
                    if (trimmed.indexOf('# Material Deck') === 0) { currentMode = "material"; return; }
                    if (trimmed.indexOf('# Main Deck') === 0) { currentMode = "main"; return; }
                    
                    let match = trimmed.match(/^(\d+)\s+(.+)$/);
                    if (match) {
                        let count = parseInt(match[1], 10);
                        let cardName = match[2].trim();
                        for (let i = 0; i < count; i++) {
                            if (currentMode === "main") mainDeck.push(cardName);
                            else if (currentMode === "material") materialDeck.push(cardName);
                        }
                    }
                });
                document.getElementById('main-count').innerText = mainDeck.length;
                log("🟢 成功載入！主牌組 " + mainDeck.length + " 張，Material 牌組 " + materialDeck.length + " 張。");
            } catch (error) {
                log("❌ 發生錯誤：" + error.message);
            }
        }

        function startGame() {
            if (mainDeck.length === 0) { alert('請先載入牌組！'); return; }
            mainDeck.sort(() => Math.random() - 0.5);
            playerHand = []; memoryZone = []; fieldZone = [];
            
            // 🪙 初始手牌：GA 規則起手抽 5 張
            for(let i=0; i<5; i++) { if(mainDeck.length > 0) playerHand.push(mainDeck.pop()); }
            
            document.getElementById('champ-block-display').innerHTML = '<div style="font-size: 11px; font-weight: bold; color: var(--champion-color);">未召喚<br>(請執行階段1)</div>';
            
            enterMaterializationPhase();
        }

        // 1️⃣ 進入具現化階段
        function enterMaterializationPhase() {
            currentPhase = "Materialization";
            hasMaterializedThisTurn = false;
            document.getElementById('game-phase-text').innerText = "1. 具現化階段";
            
            // GA 規則：每回合開始，Memory 區的所有卡片自動「重置回 Ready (未橫置)」
            memoryZone.forEach(mem => mem.isRested = false);
            
            document.getElementById('material-btn').disabled = false;
            document.getElementById('draw-btn').disabled = true;
            document.getElementById('end-turn-btn').disabled = true;
            
            updateHandUI(); updateMemoryUI(); updateFieldUI();
            log("⏱️ 回合開始：進入【具現化階段】。請點擊按鈕具現化 Material Deck 或是跳過。");
        }

        // 2️⃣ 進入主要階段
        function enterMainPhase() {
            currentPhase = "Main";
            document.getElementById('game-phase-text').innerText = "2. 主要階段";
            document.getElementById('material-btn').disabled = true;
            document.getElementById('draw-btn').disabled = false;
            document.getElementById('end-turn-btn').disabled = false;
            
            log("⏱️ 進入【主要階段】：你可以抽一張牌、打出手牌（會自動消耗可用 Memory）、或是宣告結束。");
            updateHandUI();
        }

        function playerDrawCard() {
            if (currentPhase !== "Main") return;
            if (mainDeck.length === 0) { log("❌ 牌組空了！"); return; }
            playerHand.push(mainDeck.pop());
            document.getElementById('main-count').innerText = mainDeck.length;
            updateHandUI();
            log("🎴 抽了一張牌。");
        }

        function openMaterialModal() {
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('material-modal').style.display = 'block';
            const container = document.getElementById('material-list-container');
            if (materialDeck.length === 0) { container.innerHTML = '<div>Material Deck 已空</div>'; return; }
            
            let htmlStr = "";
            for(let i=0; i<materialDeck.length; i++) {
                let cardKey = materialDeck[i];
                let card = getCardFromDatabase(cardKey);
                let costVal = card ? card.cost : 0;
                htmlStr += '<div class="modal-card-item" onclick="executeMaterialize(' + i + ')">' +
                           '<div style="font-size: 10px; font-weight: bold; color: #fff; line-height: 1.2;">' + cardKey + '</div>' +
                           '<div style="font-size: 9px; color: var(--material-color); text-align: right; font-weight: bold; margin-top:auto;">🔮 ' + costVal + '</div>' +
                           '</div>';
            }
            container.innerHTML = htmlStr;
        }

        function closeMaterialModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('material-modal').style.display = 'none';
        }

        // 具現化執行
        function executeMaterialize(index) {
            if(hasMaterializedThisTurn) return;
            let cardKey = materialDeck.splice(index, 1)[0];
            hasMaterializedThisTurn = true;
            
            // 如果是王，更新王位，其餘當成 Regalia 裝備進戰場
            if (cardKey.toLowerCase().includes("alice") || cardKey.toLowerCase().includes("spirit")) {
                document.getElementById('champ-block-display').innerHTML = 
                    '<div style="font-size: 11px; font-weight: bold; color: #fff; line-height: 1.2;">' + cardKey + '</div>' +
                    '<div style="font-size: 9px; color: var(--champion-color); margin-top: 5px;">👑 Active Champ</div>';
            } else {
                fieldZone.push(cardKey);
            }
            
            closeMaterialModal();
            log("👑 成功具現化 (Materialize)：[" + cardKey + "]");
            
            // 具現化完畢，直接進入主要階段
            enterMainPhase();
        }

        // 3️⃣ 結束主要階段，進入「記憶保存階段」
        function endPlayerTurn() {
            if (currentPhase !== "Main") return;
            currentPhase = "MemoryReserve";
            document.getElementById('game-phase-text').innerText = "3. 記憶保存階段";
            document.getElementById('draw-btn').disabled = true;
            document.getElementById('end-turn-btn').disabled = true;
            
            log("🔮 進入【記憶保存階段】：請從手牌選擇卡片「埋入 Memory」，補滿下回合可用的資源總量。");
            updateHandUI();
        }

        // 執行埋卡入 Memory (Bury)
        function buryToMemory(handIndex) {
            let cardKey = playerHand.splice(handIndex, 1)[0];
            memoryZone.push({ cardKey: cardKey, isRested: false });
            
            log("🔮 將 [" + cardKey + "] 埋入 Memory 區。");
            
            updateHandUI(); updateMemoryUI();
            
            // 埋卡完成後，回合正式結束，自動開啟新的一輪
            setTimeout(() => {
                log("🔄 系統：你的回合結束。開啟下一個玩家回合！");
                enterMaterializationPhase();
            }, 800);
        }

        // 主要階段：打出手牌
        function playCard(handIndex) {
            if (currentPhase !== "Main") return;
            let cardKey = playerHand[handIndex];
            let card = getCardFromDatabase(cardKey) || { name: cardKey, cost: 0 };
            let requiredCost = card.cost || 0;

            // 計算當前 Ready 狀態的可用 Memory 數量
            let readyMemories = memoryZone.filter(mem => !mem.isRested);
            
            if (readyMemories.length < requiredCost) {
                alert("❌ 可用 Memory 資源不足！你還需要 " + (requiredCost - readyMemories.length) + " 個未橫置的 Memory。");
                return;
            }

            // 扣除資源：將對應數量的 Memory 卡片設為 Rested (橫置)
            let spent = 0;
            for (let i = 0; i < memoryZone.length; i++) {
                if (!memoryZone[i].isRested && spent < requiredCost) {
                    memoryZone[i].isRested = true;
                    spent++;
                }
            }

            // 從手牌移出，進入戰場
            playerHand.splice(handIndex, 1);
            fieldZone.push(cardKey);
            
            log("🔥 支付 " + requiredCost + " 點資源，打出了 [" + cardKey + "] 到戰場。");
            
            updateHandUI(); updateMemoryUI(); updateFieldUI();
        }

        function updateHandUI() {
            const container = document.getElementById('player-hand-display');
            if (playerHand.length === 0) { container.innerHTML = '<span style="color:#555; font-size:12px;">手牌空了</span>'; return; }
            
            let htmlStr = "";
            for(let i=0; i<playerHand.length; i++) {
                let cardKey = playerHand[i];
                let card = getCardFromDatabase(cardKey);
                let costVal = card ? card.cost : 0;
                let idVal = card ? card.id : "---";
                
                htmlStr += '<div class="card-wrapper">' +
                           '<div style="font-size: 9px; color: #888;">' + idVal + '</div>' +
                           '<div style="font-size: 11px; font-weight: bold; color: var(--accent-color); line-height: 1.2; word-break: break-word;">' + cardKey + '</div>' +
                           '<div style="font-size: 9px; color: var(--memory-color); text-align: right; font-weight: bold;">🔮 ' + costVal + '</div>' +
                           '<div class="card-overlay-actions">';
                
                if (currentPhase === "Main") {
                    htmlStr += '<button class="card-overlay-btn play" onclick="playCard(' + i + ')">🔥 打出</button>';
                } else if (currentPhase === "MemoryReserve") {
                    htmlStr += '<button class="card-overlay-btn" style="background:#29b6f6;" onclick="buryToMemory(' + i + ')">🔮 埋入Memory</button>';
                } else {
                    htmlStr += '<div style="font-size:9px; color:#555; text-align:center;">等待階段</div>';
                }
                
                htmlStr += '</div></div>';
            }
            container.innerHTML = htmlStr;
        }

        function updateMemoryUI() {
            let totalMem = memoryZone.length;
            let readyMem = memoryZone.filter(mem => !mem.isRested).length;
            
            document.getElementById('total-memory-count').innerText = totalMem;
            document.getElementById('ready-memory-count').innerText = readyMem;
            
            const container = document.getElementById('memory-zone-display');
            if (memoryZone.length === 0) { container.innerHTML = '<span style="color:#555; font-size:12px;">空</span>'; return; }
            
            let htmlStr = "";
            for(let i=0; i<memoryZone.length; i++) {
                let memItem = memoryZone[i];
                let isRested = memItem.isRested;
                
                htmlStr += '<div class="card-wrapper ' + (isRested ? 'rested' : '') + '" style="min-width: 60px; width: 60px; height: 65px; padding: 4px;">' +
                           '<div style="font-size: 8px; color: var(--memory-color); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">' + memItem.cardKey + '</div>' +
                           (isRested ? '<div class="rested-tag">橫置</div>' : '') +
                           '</div>';
            }
            container.innerHTML = htmlStr;
        }

        function updateFieldUI() {
            const container = document.getElementById('field-zone-display');
            if (fieldZone.length === 0) { container.innerHTML = '<span style="color:#555; font-size:11px;">場上沒有卡片</span>'; return; }
            
            let htmlStr = "";
            for(let i=0; i<fieldZone.length; i++) {
                htmlStr += '<div class="card-wrapper" style="min-width: 65px; width: 65px; height: 75px; padding: 4px; border-color:#888;">' +
                           '<div style="font-size: 9px; color: #fff; line-height:1.2; word-break:break-all;">' + fieldZone[i] + '</div>' +
                           '</div>';
            }
            container.innerHTML = htmlStr;
        }
    </script>
</body>
</html>
