<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GA 練牌模擬器 v11.0 - 官方原畫完美版</title>
    <style>
        :root {
            --bg-color: #0d0d11;
            --card-bg: #16161a;
            --accent-color: #ffca28;
            --memory-color: #29b6f6;
            --material-color: #ec407a;
            --champion-color: #ab47bc;
            --enemy-color: #ff5252;
            --text-color: #ffffff;
            --border-color: #2a2a35;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h3 { margin: 5px 0; color: var(--accent-color); text-align: center; font-size: 16px; }
        .game-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        .zone { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .battle-status { display: flex; justify-content: space-between; gap: 10px; }
        .status-box { flex: 1; padding: 8px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 13px; }

        .card-display-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0;
            min-height: 160px;
            align-items: center;
        }

        .champ-view-container { display: flex; justify-content: center; align-items: center; margin: 5px 0; }
        .champ-img-box {
            width: 110px;
            height: 154px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--champion-color);
            box-shadow: 0 0 15px rgba(171, 71, 188, 0.5);
            background: #111;
        }
        .champ-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .card-wrapper {
            position: relative;
            min-width: 110px;
            width: 110px;
            height: 154px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            background-color: #222;
        }
        .card-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .card-overlay-actions {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 3px;
        }
        .card-overlay-btn {
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 10px;
            border: none;
            border-radius: 4px;
            padding: 3px 0;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
        }
        .card-overlay-btn.play { background: rgba(76, 175, 80, 0.85); }

        .btn {
            background-color: var(--accent-color); color: #000; border: none;
            padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer;
        }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        
        textarea {
            width: 100%; height: 60px; background: #050508; color: #fff;
            border: 1px solid var(--border-color); border-radius: 6px; font-size: 12px; padding: 5px; box-sizing: border-box;
        }

        .log-box {
            background-color: #050508; color: #00ff00; padding: 8px; height: 120px;
            overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 6px; border: 1px solid var(--border-color);
        }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); border: 2px solid var(--material-color); padding: 15px; border-radius: 12px; z-index: 100; width: 85%; max-width: 400px;
        }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
        .modal-list { max-height: 250px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .modal-card-item { position: relative; width: 80px; height: 112px; border-radius: 6px; overflow: hidden; cursor: pointer; border: 1px solid #444; background-color: #222; }
        .modal-card-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .modal-card-mask {
            position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>GA 模擬器 (官方原畫完美版)</h1>

        <div class="zone">
            <textarea id="deck-input" placeholder="在此貼上 ShoutAtYourDecks 的 B 列表文字..."></textarea>
            <div class="btn-group">
                <button class="btn" onclick="importDeck()">解析並載入</button>
                <button class="btn" style="background:#444; color:#fff;" onclick="startGame()">洗牌並開始</button>
            </div>
        </div>

        <div class="battle-status">
            <div class="status-box" style="background: #221212; border: 1px solid var(--enemy-color); color: var(--enemy-color);">
                🤖 AI 血量: <span id="ai-hp">30</span>
                <div style="font-size: 10px; font-weight: normal; color:#aaa; margin-top:2px;">AI 剩餘: <span id="ai-deck-count">0</span></div>
            </div>
            <div class="status-box" style="background: #112211; border: 1px solid #4caf50; color: #4caf50;">
                🛡️ 玩家血量: <span id="player-hp">30</span>
                <div style="font-size: 10px; font-weight: normal; color:var(--memory-color); margin-top:2px;">🔮 可用 Memory: <span id="current-memory">0</span></div>
            </div>
        </div>

        <div class="zone" style="border-color: var(--champion-color); display: flex; flex-direction: column; align-items: center;">
            <h3>👑 你的戰場 Champion</h3>
            <div class="champ-view-container">
                <div class="champ-img-box">
                    <img id="champ-image-display" src="https://get.gatcg.com/cards/back.jpg" alt="Champion">
                </div>
            </div>
            <button class="btn" style="background-color: var(--material-color); color: white; padding: 6px 12px; font-size: 12px; margin-top: 5px;" onclick="openMaterialModal()">打開 Material Deck</button>
        </div>

        <div class="zone">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>🎴 你的手牌</h3>
                <button class="btn" style="background: #ff9800; padding: 4px 10px; font-size: 12px;" onclick="endPlayerTurn()">🛑 結束回合</button>
            </div>
            <div class="card-display-container" id="player-hand-display">
                <span style="color:#555; font-size:12px;">請點擊「洗牌並開始」</span>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="playerDrawCard()">從主牌組抽卡 (Main: <span id="main-count">0</span>)</button>
            </div>
        </div>

        <div class="zone" style="border-color: var(--memory-color);">
            <h3>🔮 回憶資源區 (Memory Zone)</h3>
            <div class="card-display-container" id="memory-zone-display" style="min-height: 80px;">
                <span style="color:#555; font-size:12px;">空</span>
            </div>
        </div>

        <div class="zone">
            <div class="log-box" id="game-log">系統核心準備就緒。請貼入牌組點擊解析。</div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeMaterialModal()"></div>
    <div class="modal" id="material-modal">
        <h3 style="color: var(--material-color); margin: 0;">點擊圖片進行召喚/升級</h3>
        <div class="modal-list" id="material-list-container"></div>
        <button class="btn" style="background:#444; color:#fff; width:100%; margin-top:10px;" onclick="closeMaterialModal()">關閉</button>
    </div>

    <script>
        // 💥 改用全球 CDN 開放節點，徹底解決 ERR_NAME_NOT_RESOLVED 找不到伺服器的問題
        const DEFAULT_BACK = "https://cards.worldofalthea.com/cards/back.png";
        
        const cardDatabase = {
            "Spirit of Water": { name: "Spirit of Water", cost: 0, id: "DOA068" },
            "Alice, Golden Queen": { name: "Alice, Golden Queen", cost: 1, id: "DOA001" },
            "Alice, Whim's Monarch": { name: "Alice, Whim's Monarch", cost: 1, id: "DOA003" },
            "Alice, Trifle's Royalty": { name: "Alice, Trifle's Royalty", cost: 1, id: "DOA002" },
            "Dropped Band": { name: "Dropped Band", cost: 0, id: "DOA122" },
            "Fire Resonance Bauble": { name: "Fire Resonance Bauble", cost: 0, id: "DOA121" },
            "Grand Crusader's Ring": { name: "Grand Crusader's Ring", cost: 1, id: "FTC134" },
            "Lagomorph Piece": { name: "Lagomorph Piece", cost: 0, id: "FTC137" },
            "Prismspire Scepter": { name: "Prismspire Scepter", cost: 1, id: "DOA130" },
            "Spellward Scepter": { name: "Spellward Scepter", cost: 1, id: "DOA134" },
            "Tariff Ring": { name: "Tariff Ring", cost: 0, id: "FTC142" },
            "Water Resonance Bauble": { name: "Water Resonance Bauble", cost: 0, id: "DOA136" },
            "Castling": { name: "Castling", cost: 1, id: "FTC047" },
            "Field of Ranks and Files": { name: "Field of Ranks and Files", cost: 1, id: "FTC031" },
            "Golden Bishop": { name: "Golden Bishop", cost: 2, id: "FTC033" },
            "Golden Checkmate": { name: "Golden Checkmate", cost: 3, id: "FTC032" },
            "Golden Gambit": { name: "Golden Gambit", cost: 1, id: "FTC048" },
            "Golden Pawn": { name: "Golden Pawn", cost: 0, id: "FTC034" },
            "Golden Rook": { name: "Golden Rook", cost: 3, id: "FTC035" },
            "March On": { name: "March On", cost: 1, id: "FTC039" },
            "Queen's Gambit": { name: "Queen's Gambit", cost: 2, id: "FTC042" },
            "Sacrifice Play": { name: "Sacrifice Play", cost: 1, id: "FTC044" },
            "Summon Pawn": { name: "Summon Pawn", cost: 1, id: "FTC046" },
            "Castling Boon": { name: "Castling Boon", cost: 1, id: "FTC030" },
            "Doubled Pawns": { name: "Doubled Pawns", cost: 1, id: "FTC050" },
            "Hunt, Weiss King": { name: "Hunt, Weiss King", cost: 4, id: "FTC052" },
            "Lily, Marine Castellan": { name: "Lily, Marine Castellan", cost: 2, id: "DOA076" },
            "Snow White, Weiss Queen": { name: "Snow White, Weiss Queen", cost: 4, id: "FTC054" },
            "Song of Frost": { name: "Song of Frost", cost: 2, id: "DOA088" },
            "Weiss Bishop": { name: "Weiss Bishop", cost: 2, id: "FTC056" }
        };

        let mainDeck = []; let materialDeck = []; let playerHand = []; let memoryZone = [];
        let currentMemory = 0; let aiDeck = []; let aiHP = 30; let playerHP = 30; let isPlayerTurn = true;
        
        const logBox = document.getElementById('game-log');
        function log(msg) { logBox.innerHTML += `<br>> ${msg}`; logBox.scrollTop = logBox.scrollHeight; }

        function getCardFromDatabase(cardKey) {
            if (!cardKey) return null;
            let cleanedKey = cardKey.split('(')[0].trim();
            let lowerKey = cleanedKey.toLowerCase();
            
            for (let dbKey in cardDatabase) {
                if (dbKey.toLowerCase() === lowerKey) {
                    return cardDatabase[dbKey];
                }
            }
            return null;
        }

       function getCardImage(cardObj) {
            if (cardObj && cardObj.id) {
                // World of Althea 節點格式：強制大寫卡號並加上 .png
                return `https://cards.worldofalthea.com/cards/${cardObj.id.toUpperCase()}.png`;
            }
            return DEFAULT_BACK;
        }

        function importDeck() {
            try {
                const text = document.getElementById('deck-input').value.trim();
                if (!text) { alert('請貼入文字！'); return; }
                
                mainDeck = []; materialDeck = [];
                let currentMode = "";
                const lines = text.split('\n');
                
                lines.forEach(line => {
                    let trimmed = line.trim();
                    if (!trimmed) return;
                    if (trimmed.startsWith('# Material Deck')) { currentMode = "material"; return; }
                    if (trimmed.startsWith('# Main Deck')) { currentMode = "main"; return; }
                    
                    let match = trimmed.match(/^(\d+)\s+(.+)$/);
                    if (match) {
                        let count = parseInt(match[1], 10);
                        let cardName = match[2].trim();
                        log(`成功讀取: ${cardName}`);
                        for (let i = 0; i < count; i++) {
                            if (currentMode === "main") mainDeck.push(cardName);
                            else if (currentMode === "material") materialDeck.push(cardName);
                        }
                    }
                });
                
                document.getElementById('main-count').innerText = mainDeck.length;
                log(`🟢 載入成功！主牌組計 ${mainDeck.length} 張。`);
            } catch (error) {
                log(`❌ 系統發生錯誤：${error.message}`);
            }
        }

        function startGame() {
            if (mainDeck.length === 0) { alert('請先載入牌組！'); return; }
            mainDeck.sort(() => Math.random() - 0.5);
            playerHand = []; memoryZone = []; currentMemory = 0; playerHP = 30; aiHP = 30; isPlayerTurn = true;
            aiDeck = ["Golden Pawn", "Song of Frost"];
            
            document.getElementById('player-hp').innerText = playerHP;
            document.getElementById('ai-hp').innerText = aiHP;
            document.getElementById('ai-deck-count').innerText = aiDeck.length;
            document.getElementById('champ-image-display').src = DEFAULT_BACK;
            
            updateHandUI(); updateMemoryUI();
            log('⚔️ 模擬開始！請點擊下方抽卡。');
        }

        function playerDrawCard() {
            if (!isPlayerTurn || mainDeck.length === 0) return;
            playerHand.push(mainDeck.pop());
            document.getElementById('main-count').innerText = mainDeck.length;
            updateHandUI();
        }

        function buryToMemory(handIndex) {
            if (!isPlayerTurn) return;
            let cardKey = playerHand.splice(handIndex, 1)[0];
            memoryZone.push(cardKey);
            currentMemory += 1;
            updateHandUI(); updateMemoryUI();
            log(`🔮 [${cardKey}] 已變更為回憶資源。`);
        }

        function playCard(handIndex) {
            if (!isPlayerTurn) return;
            let cardKey = playerHand[handIndex];
            let card = getCardFromDatabase(cardKey) || { name: cardKey, cost: 1, power: 2 };

            if (currentMemory < (card.cost || 1)) {
                alert("資源不足！");
                return;
            }

            currentMemory -= (card.cost || 1);
            playerHand.splice(handIndex, 1);
            log(`🔥 你打出了 [${cardKey}]！`);
            
            let p = card.power || 2;
            aiHP -= p; if (aiHP < 0) aiHP = 0;
            document.getElementById('ai-hp').innerText = aiHP;
            
            updateHandUI(); updateMemoryUI();
        }

        function endPlayerTurn() {
            if (!isPlayerTurn) return;
            isPlayerTurn = false;
            log('🛑 結束回合，輪到 AI。');
            setTimeout(aiTurnAction, 1000);
        }

        function aiTurnAction() {
            log('🤖 AI 抽牌並發動了攻勢！');
            playerHP -= 3; if (playerHP < 0) playerHP = 0;
            document.getElementById('player-hp').innerText = playerHP;
            setTimeout(() => {
                isPlayerTurn = true;
                log('🟢 你的回合開始！');
            }, 800);
        }

        function openMaterialModal() {
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('material-modal').style.display = 'block';
            const container = document.getElementById('material-list-container');
            if (materialDeck.length === 0) { container.innerHTML = '<div>已空</div>'; return; }
            
            container.innerHTML = materialDeck.map((cardKey, index) => {
                let card = getCardFromDatabase(cardKey);
                let imgSrc = getCardImage(card);
                return `
                    <div class="modal-card-item" onclick="levelUpHero(${index})">
                        <img src="${imgSrc}">
                        <div class="modal-card-mask">🔮 ${card ? card.cost : 0}</div>
                    </div>
                `;
            }).join('');
        }

        function closeMaterialModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('material-modal').style.display = 'none';
        }

        function levelUpHero(index) {
            let cardKey = materialDeck[index];
            let card = getCardFromDatabase(cardKey);
            materialDeck.splice(index, 1);
            document.getElementById('champ-image-display').src = getCardImage(card);
            closeMaterialModal(); updateMemoryUI();
            log(`👑 英雄升級：[${cardKey}]`);
        }

        function updateHandUI() {
            const container = document.getElementById('player-hand-display');
            if (playerHand.length === 0) { container.innerHTML = '<span style="color:#555; font-size:12px;">手牌空了</span>'; return; }
            
            container.innerHTML = playerHand.map((cardKey, index) => {
                let card = getCardFromDatabase(cardKey);
                let imgSrc = getCardImage(card);
                return `
                    <div class="card-wrapper">
                        <img src="${imgSrc}">
                        <div class="card-overlay-actions">
                            <button class="card-overlay-btn play" onclick="playCard(${index})">🔥 打出</button>
                            <button class="card-overlay-btn" onclick="buryToMemory(${index})">🔮 回憶</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateMemoryUI() {
            document.getElementById('current-memory').innerText = currentMemory;
            const container = document.getElementById('memory-zone-display');
            if (memoryZone.length === 0) { container.innerHTML = '<span style="color:#555; font-size:12px;">空</span>'; return; }
            
            container.innerHTML = memoryZone.map((cardKey) => {
                let card = getCardFromDatabase(cardKey);
                let imgSrc = getCardImage(card);
                return `
                    <div class="card-wrapper" style="min-width: 50px; width: 50px; height: 70px;">
                        <img src="${imgSrc}" style="filter: grayscale(0.4);">
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
