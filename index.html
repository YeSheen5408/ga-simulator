<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GA 練牌模擬器 v4.0 - 牌組匯入功能</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ffca28;
            --memory-color: #29b6f6;
            --material-color: #ec407a;
            --text-color: #ffffff;
            --border-color: #333333;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h3 { margin: 5px 0; color: var(--accent-color); text-align: center; }
        .game-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        .zone { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #222;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
        }

        .card-display-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 0;
            min-height: 110px;
            align-items: center;
        }

        .card-item {
            min-width: 90px;
            height: 120px;
            background-color: #2a2a2a;
            border: 2px solid var(--accent-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
            font-size: 11px;
            text-align: center;
        }
        .card-cost { text-align: right; font-weight: bold; color: var(--memory-color); }
        .card-name { font-weight: bold; margin: 5px 0; overflow: hidden; text-overflow: ellipsis; }
        .card-action-btn {
            background: var(--memory-color);
            color: #000;
            font-size: 9px;
            border: none;
            border-radius: 3px;
            padding: 2px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        
        textarea {
            width: 100%;
            height: 120px;
            background: #000;
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 12px;
            padding: 5px;
            box-sizing: border-box;
            font-family: monospace;
        }

        .log-box {
            background-color: #000;
            color: #00ff00;
            padding: 8px;
            height: 90px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>GA 模擬器 (牌組匯入版)</h1>

        <div class="zone">
            <h3>1. 貼上 ShoutAtYourDecks B 列表</h3>
            <textarea id="deck-input" placeholder="# Material Deck&#10;1 Spirit of Water&#10;&#10;# Main Deck&#10;4 Castling"></textarea>
            <div class="btn-group">
                <button class="btn" onclick="importDeck()">解析並載入牌組</button>
                <button class="btn" style="background:#555; color:#fff;" onclick="startGame()">洗牌並開始對戰</button>
            </div>
            <div style="font-size: 12px; margin-top: 8px; color: #aaa; display: flex; justify-content: space-between;">
                <span>🎴 Main 剩餘：<b id="main-count" style="color:var(--accent-color)">0</b> 張</span>
                <span>💎 Material 剩餘：<b id="material-count" style="color:var(--material-color)">0</b> 張</span>
            </div>
        </div>

        <div class="status-bar" style="border-left: 4px solid var(--memory-color);">
            <span>❤️ 玩家血量: 20</span>
            <span style="color: var(--memory-color); font-weight: bold;">🔮 可用 Memory: <span id="current-memory">0</span></span>
        </div>

        <div class="zone">
            <h3>2. 玩家手牌</h3>
            <div class="card-display-container" id="player-hand-display">
                <span style="color:#666; font-size:12px;">尚未開始遊戲</span>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="playerDrawCard()">從 Main Deck 抽一張牌</button>
            </div>
        </div>

        <div class="zone" style="border-color: var(--memory-color);">
            <h3>🔮 回憶區 (Memory Zone)</h3>
            <div class="card-display-container" id="memory-zone-display" style="min-height: 40px;">
                <span style="color:#666; font-size:12px;">空</span>
            </div>
        </div>

        <div class="zone">
            <h3>遊戲歷程</h3>
            <div class="log-box" id="game-log">系統提示：請將 B 列表文字貼入上方框中，點擊「解析並載入牌組」。</div>
        </div>
    </div>

    <script>
        // --- 1. 卡牌數據庫 (擴充你提供的卡牌範例) ---
        const cardDatabase = {
            "Castling": { name: "Castling", cost: 1, type: "Skill" },
            "Golden Pawn": { name: "Golden Pawn", cost: 0, type: "Ally" },
            "Song of Frost": { name: "Song of Frost", cost: 2, type: "Spell" },
            "Spirit of Water": { name: "Spirit of Water", cost: 0, type: "Spirit" },
            "Alice, Golden Queen": { name: "Alice, Golden Queen", cost: 0, type: "Champion" }
        };

        // --- 2. 遊戲狀態變數 ---
        let mainDeck = [];
        let materialDeck = [];
        let playerHand = [];
        let memoryZone = [];
        let currentMemory = 0;

        const logBox = document.getElementById('game-log');

        function log(msg) {
            logBox.innerHTML += `<br>> ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- 3. B 列表文字解析引擎 ---
        function importDeck() {
            const text = document.getElementById('deck-input').value.trim();
            if (!text) {
                alert('請先貼入文字列表！');
                return;
            }

            // 重設暫存
            mainDeck = [];
            materialDeck = [];
            let currentMode = ""; // 用來追蹤目前讀到哪一個區塊 ("material", "main", "side")

            const lines = text.split('\n');
            
            lines.forEach(line => {
                let trimmed = line.trim();
                if (!trimmed) return; // 跳過空行

                // 檢查區塊標頭
                if (trimmed.startsWith('# Material Deck')) {
                    currentMode = "material";
                    return;
                } else if (trimmed.startsWith('# Main Deck')) {
                    currentMode = "main";
                    return;
                } else if (trimmed.startsWith('# Sideboard')) {
                    currentMode = "side";
                    return;
                }

                // 使用正規表達式解析行： 數字 + 空格 + 卡名
                // 例如 "4 Castling" 匹配出來會是 match[1]="4", match[2]="Castling"
                let match = trimmed.match(/^(\d+)\s+(.+)$/);
                if (match) {
                    let count = parseInt(match[1], 10);
                    let cardName = match[2].trim();

                    // 將指定數量的卡片塞入對應的陣列
                    for (let i = 0; i < count; i++) {
                        if (currentMode === "main") {
                            mainDeck.push(cardName);
                        } else if (currentMode === "material") {
                            materialDeck.push(cardName);
                        }
                    }
                }
            });

            // 更新介面數量
            document.getElementById('main-count').innerText = mainDeck.length;
            document.getElementById('material-count').innerText = materialDeck.length;
            
            log(`成功匯入！Main Deck: ${mainDeck.length} 張, Material Deck: ${materialDeck.length} 張。`);
        }

        // 遊戲初始化
        function startGame() {
            if (mainDeck.length === 0 && materialDeck.length === 0) {
                alert('請先解析並載入牌組！');
                return;
            }
            // 只洗主牌組，Material Deck 在 GA 中通常是排好或公開選擇的
            mainDeck.sort(() => Math.random() - 0.5);
            playerHand = [];
            memoryZone = [];
            currentMemory = 0;
            
            updateHandUI();
            updateMemoryUI();
            log('⚡ 遊戲已開始！主牌組已完成洗牌。');
        }

        // 玩家從 Main Deck 抽牌
        function playerDrawCard() {
            if (mainDeck.length === 0) {
                log('❌ Main Deck 已經沒有卡牌了！');
                return;
            }
            let cardKey = mainDeck.pop();
            playerHand.push(cardKey);
            
            document.getElementById('main-count').innerText = mainDeck.length;
            updateHandUI();
            log(`你抽到了：[${cardKey}]`);
        }

        // 將手牌放到回憶區
        function buryToMemory(handIndex) {
            let cardKey = playerHand.splice(handIndex, 1)[0];
            memoryZone.push(cardKey);
            currentMemory += 1;
            
            updateHandUI();
            updateMemoryUI();
            log(`🔮 你將 [${cardKey}] 放入回憶區。目前可用 Memory: ${currentMemory}`);
        }

        // 更新手牌 UI
        function updateHandUI() {
            const container = document.getElementById('player-hand-display');
            if (playerHand.length === 0) {
                container.innerHTML = '<span style="color:#666; font-size:12px;">手牌目前是空的</span>';
                return;
            }

            container.innerHTML = playerHand.map((cardKey, index) => {
                // 如果資料庫找不到此卡，給予一個預設值防止當機
                let card = cardDatabase[cardKey] || { name: cardKey, cost: "?" };
                return `
                    <div class="card-item">
                        <div class="card-cost">🔮${card.cost}</div>
                        <div class="card-name">${card.name}</div>
                        <button class="card-action-btn" onclick="buryToMemory(${index})">設為回憶</button>
                    </div>
                `;
            }).join('');
        }

        // 更新回憶區 UI
        function updateMemoryUI() {
            document.getElementById('current-memory').innerText = currentMemory;
            const container = document.getElementById('memory-zone-display');
            if (memoryZone.length === 0) {
                container.innerHTML = '<span style="color:#666; font-size:12px;">空</span>';
                return;
            }
            container.innerHTML = memoryZone.map((cardKey) => {
                return `<div style="background:#111; border:1px solid var(--memory-color); padding:2px 5px; border-radius:4px; font-size:10px;">${cardKey}</div>`;
            }).join(' ');
        }
    </script>
</body>
</html>
