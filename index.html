<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GA 練牌模擬器 v9.0 - 官方完整版</title>
    <link rel="manifest" href="./manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GA模擬器">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/000000/card-games.png">

    <style>
        :root {
            --bg-color: #0d0d11;
            --card-bg: #16161a;
            --accent-color: #ffca28;
            --memory-color: #29b6f6;
            --material-color: #ec407a;
            --champion-color: #ab47bc;
            --enemy-color: #ff5252;
            --text-color: #ffffff;
            --border-color: #2a2a35;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h3 { margin: 5px 0; color: var(--accent-color); text-align: center; font-size: 16px; }
        .game-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        .zone { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .battle-status { display: flex; justify-content: space-between; gap: 10px; }
        .status-box { flex: 1; padding: 8px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 13px; }

        .card-display-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0;
            min-height: 160px;
            align-items: center;
        }

        .champ-view-container { display: flex; justify-content: center; align-items: center; margin: 5px 0; }
        .champ-img-box {
            width: 110px;
            height: 154px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--champion-color);
            box-shadow: 0 0 15px rgba(171, 71, 188, 0.5);
            background: #111;
        }
        .champ-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .card-wrapper {
            position: relative;
            min-width: 110px;
            width: 110px;
            height: 154px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .card-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .card-overlay-actions {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 3px;
        }
        .card-overlay-btn {
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 10px;
            border: none;
            border-radius: 4px;
            padding: 3px 0;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
        }
        .card-overlay-btn.play { background: rgba(76, 175, 80, 0.8); }

        .btn {
            background-color: var(--accent-color); color: #000; border: none;
            padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer;
        }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        
        textarea {
            width: 100%; height: 60px; background: #050508; color: #fff;
            border: 1px solid var(--border-color); border-radius: 6px; font-size: 12px; padding: 5px; box-sizing: border-box;
        }

        .log-box {
            background-color: #050508; color: #00ff00; padding: 8px; height: 90px;
            overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 6px; border: 1px solid var(--border-color);
        }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); border: 2px solid var(--material-color); padding: 15px; border-radius: 12px; z-index: 100; width: 85%; max-width: 400px;
        }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
        .modal-list { max-height: 250px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .modal-card-item { position: relative; width: 80px; height: 112px; border-radius: 6px; overflow: hidden; cursor: pointer; border: 1px solid #444; }
        .modal-card-item img { width: 100%; height: 100%; object-fit: cover; }
        .modal-card-mask {
            position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>GA 模擬器 (全環境完整修正版)</h1>

        <div class="zone">
            <textarea id="deck-input" placeholder="在此貼上 ShoutAtYourDecks 的 B 列表文字..."></textarea>
            <div class="btn-group">
                <button class="btn" onclick="importDeck()">解析並載入</button>
                <button class="btn" style="background:#444; color:#fff;" onclick="startGame()">洗牌並開始</button>
            </div>
        </div>

        <div class="battle-status">
            <div class="status-box" style="background: #221212; border: 1px solid var(--enemy-color); color: var(--enemy-color);">
                🤖 AI 血量: <span id="ai-hp">30</span>
                <div style="font-size: 10px; font-weight: normal; color:#aaa; margin-top:2px;">AI 剩餘: <span id="ai-deck-count">0</span></div>
            </div>
            <div class="status-box" style="background: #112211; border: 1px solid #4caf50; color: #4caf50;">
                🛡️ 玩家血量: <span id="player-hp">30</span>
                <div style="font-size: 10px; font-weight: normal; color:var(--memory-color); margin-top:2px;">🔮 可用 Memory: <span id="current-memory">0</span></div>
            </div>
        </div>

        <div class="zone" style="border-color: var(--champion-color); display: flex; flex-direction: column; align-items: center;">
            <h3>👑 你的戰場 Champion</h3>
            <div class="champ-view-container">
                <div class="champ-img-box">
                    <img id="champ-image-display" src="https://api.grandarchivetcg.com/v1/cards/back/image" alt="Champion">
                </div>
            </div>
            <button class="btn" style="background-color: var(--material-color); color: white; padding: 6px 12px; font-size: 12px; margin-top: 5px;" onclick="openMaterialModal()">打開 Material Deck</button>
        </div>

        <div class="zone">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>🎴 你的手牌</h3>
                <button class="btn" style="background: #ff9800; padding: 4px 10px; font-size: 12px;" onclick="endPlayerTurn()">🛑 結束回合</button>
            </div>
            <div class="card-display-container" id="player-hand-display">
                <span style="color:#555; font-size:12px;">點擊上方按鈕開始遊戲</span>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="playerDrawCard()">從主牌組抽卡 (Main: <span id="main-count">0</span>)</button>
            </div>
        </div>

        <div class="zone" style="border-color: var(--memory-color);">
            <h3>🔮 回憶資源區 (Memory Zone)</h3>
            <div class="card-display-container" id="memory-zone-display" style="min-height: 80px;">
                <span style="color:#555; font-size:12px;">空</span>
            </div>
        </div>

        <div class="zone">
            <div class="log-box" id="game-log">系統提示：請貼入牌組文字，點擊「解析並載入」。</div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeMaterialModal()"></div>
    <div class="modal" id="material-modal">
        <h3 style="color: var(--material-color); margin: 0;">點擊圖片進行召喚/升級</h3>
        <div class="modal-list" id="material-list-container"></div>
        <button class="btn" style="background:#444; color:#fff; width:100%; margin-top:10px;" onclick="closeMaterialModal()">關閉</button>
    </div>

    <script>
        // --- 1. 卡牌數據庫 (已校對所有括號，無語法衝突) ---
        const DEFAULT_BACK = "https://api.grandarchivetcg.com/v1/cards/back/image";
        
        const cardDatabase = {
            // === Material Deck ===
            "Spirit of Water": { name: "Spirit of Water", cost: 0, type: "Spirit", level: 0, id: "DOA068" },
            "Alice, Golden Queen": { name: "Alice, Golden Queen", cost: 1, type: "Champion", level: 1, id: "DOA001" },
            "Alice, Whim's Monarch": { name: "Alice, Whim's Monarch", cost: 1, type: "Champion", level: 2, id: "DOA003" },
            "Alice, Trifle's Royalty": { name: "Alice, Trifle's Royalty", cost: 1, type: "Champion", level: 3, id: "DOA002" },
            "Dropped Band": { name: "Dropped Band", cost: 0, type: "Regalia", id: "DOA122" },
            "Fire Resonance Bauble": { name: "Fire Resonance Bauble", cost: 0, type: "Regalia", id: "DOA121" },
            "Grand Crusader's Ring": { name: "Grand Crusader's Ring", cost: 1, type: "Regalia", id: "FTC134" },
            "Lagomorph Piece": { name: "Lagomorph Piece", cost: 0, type: "Regalia", id: "FTC137" },
            "Prismspire Scepter": { name: "Prismspire Scepter", cost: 1, type: "Regalia", id: "DOA130" },
            "Spellward Scepter": { name: "Spellward Scepter", cost: 1, type: "Regalia", id: "DOA134" },
            "Tariff Ring": { name: "Tariff Ring", cost: 0, type: "Regalia", id: "FTC142" },
            "Water Resonance Bauble": { name: "Water Resonance Bauble", cost: 0, type: "Regalia", id: "DOA136" },

            // === Main Deck ===
            "Castling": { name: "Castling", cost: 1, type: "Skill", power: 0, id: "FTC047" },
            "Field of Ranks and Files": { name: "Field of Ranks and Files", cost: 1, type: "Skill", power: 0, id: "FTC031" },
            "Golden Bishop": { name: "Golden Bishop", cost: 2, type: "Ally", power: 2, id: "FTC033" },
            "Golden Checkmate": { name: "Golden Checkmate", cost: 3, type: "Attack", power: 6, id: "FTC032" },
            "Golden Gambit": { name: "Golden Gambit", cost: 1, type: "Skill", power: 0, id: "FTC048" },
            "Golden Pawn": { name: "Golden Pawn", cost: 0, type: "Ally", power: 1, id: "FTC034" },
            "Golden Rook": { name: "Golden Rook", cost: 3, type: "Ally", power: 4, id: "FTC035" },
            "March On": { name: "March On", cost: 1, type: "Skill", power: 0, id: "FTC039" },
            "Queen's Gambit": { name: "Queen's Gambit", cost: 2, type: "Skill", power: 0, id: "FTC042" },
            "Sacrifice Play": { name: "Sacrifice Play", cost: 1, type: "Skill", power: 0, id: "FTC044" },
            "Summon Pawn": { name: "Summon Pawn", cost: 1, type: "Spell", power: 0, id: "FTC046" },
            "Castling Boon": { name: "Castling Boon", cost: 1, type: "Skill", power: 0, id: "FTC030" },
            "Doubled Pawns": { name: "Doubled Pawns", cost: 1, type: "Attack", power: 2, id: "FTC050" },
            "Hunt, Weiss King": { name: "Hunt, Weiss King", cost: 4, type: "Ally", power: 5, id: "FTC052" },
            "Lily, Marine Castellan": { name: "Lily, Marine Castellan", cost: 2, type: "Ally", power: 2, id: "DOA076" },
            "Snow White, Weiss Queen": { name: "Snow White, Weiss Queen", cost: 4, type: "Ally", power: 5, id: "FTC054" },
            "Song of Frost": { name: "Song of Frost", cost: 2, type: "Spell", power: 4, id: "DOA088" },
            "Weiss Bishop": { name: "Weiss Bishop", cost: 2, type: "Ally", power: 2, id: "FTC056" }
        };

        // --- 2. 核心狀態與輔助函數 ---
        let mainDeck = []; let materialDeck = []; let playerHand = []; let memoryZone = [];
        let currentMemory = 0; let aiDeck = []; let aiHP = 30; let playerHP = 30; let isPlayerTurn = true;
        
        const logBox = document.getElementById('game-log');
        function log(msg) { logBox.innerHTML += `<br>> ${msg}`; logBox.scrollTop = logBox.scrollHeight; }

        function getCardFromDatabase(cardKey) {
            let cleanedKey = cardKey.split('(')[0].trim();
            let lowerKey = cleanedKey.toLowerCase();
            
            for (let dbKey in cardDatabase) {
                if (dbKey.toLowerCase() === lowerKey) {
                    return cardDatabase[dbKey];
                }
            }
            return null;
        }

        function getCardImage(cardObj) {
            if (cardObj && cardObj.id) {
                return `https://api.grandarchivetcg.com/v1/cards/${cardObj.id}/image`;
            }
            return DEFAULT_BACK;
        }

        // --- 3. 遊戲核心邏輯 ---
        function importDeck() {
            const text = document.getElementById('deck-input').value.trim();
            if (!text) { alert('請貼入文字！'); return; }
            mainDeck = []; materialDeck = [];
            let currentMode = "";
            
            text.split('\n').forEach(line => {
                let trimmed = line.trim();
                if (!trimmed) return;
                if (trimmed.startsWith('# Material Deck')) { currentMode = "material"; return; }
                if (trimmed.startsWith('# Main Deck
