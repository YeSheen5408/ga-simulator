<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GA 練牌模擬器 v7.0 - AI 反擊系統</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ffca28;
            --memory-color: #29b6f6;
            --material-color: #ec407a;
            --champion-color: #ab47bc;
            --enemy-color: #ff5252;
            --text-color: #ffffff;
            --border-color: #333333;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h3 { margin: 5px 0; color: var(--accent-color); text-align: center; }
        .game-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        .zone { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; }

        /* 雙方狀態看板 */
        .battle-status {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .status-box {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        .card-display-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 0;
            min-height: 50px;
            align-items: center;
        }

        .champ-card {
            background-color: #311b92;
            border: 2px solid var(--champion-color);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        .card-item {
            min-width: 100px;
            height: 140px;
            background-color: #2a2a2a;
            border: 2px solid var(--accent-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
            font-size: 11px;
            text-align: center;
        }
        .card-cost { text-align: right; font-weight: bold; color: var(--memory-color); }
        .card-name { font-weight: bold; margin: 2px 0; }
        .card-stats { font-size: 10px; color: #aaa; margin-bottom: 5px; }
        
        .card-action-btn {
            background: var(--memory-color);
            color: #000;
            font-size: 10px;
            border: none;
            border-radius: 3px;
            padding: 3px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 2px;
        }

        .btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        
        textarea {
            width: 100%; height: 60px; background: #000; color: #fff;
            border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; padding: 5px; box-sizing: border-box;
        }

        .log-box {
            background-color: #000; color: #00ff00; padding: 8px; height: 110px;
            overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 6px;
        }

        /* Modal 樣式 */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e1e1e; border: 2px solid var(--material-color); padding: 15px; border-radius: 10px; z-index: 100; width: 85%; max-width: 400px;
        }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99; }
        .modal-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .modal-item { background: #2a2a2a; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    </style>


    <link rel="manifest" href="./manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GA模擬器">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/000000/card-games.png">
</head>
<body>

    <div class="game-container">
        <h1>GA 模擬器 (AI 對戰完整版)</h1>

        <div class="zone">
            <h3>1. 牌組匯入</h3>
            <textarea id="deck-input" placeholder="在此貼上 B 列表文字..."></textarea>
            <div class="btn-group">
                <button class="btn" onclick="importDeck()">解析並載入牌組</button>
                <button class="btn" style="background:#555; color:#fff;" onclick="startGame()">洗牌並開始</button>
            </div>
        </div>

        <div class="battle-status">
            <div class="status-box" style="background: #2c1a1a; border: 1px solid var(--enemy-color); color: var(--enemy-color);">
                🤖 AI 血量: <span id="ai-hp">30</span>
                <div style="font-size: 10px; font-weight: normal; margin-top:3px; color:#aaa;">牌組剩餘: <span id="ai-deck-count">0</span> 張</div>
            </div>
            <div class="status-box" style="background: #1a2c1a; border: 1px solid #4caf50; color: #4caf50;">
                🛡️ 玩家血量: <span id="player-hp">30</span>
                <div style="font-size: 10px; font-weight: normal; margin-top:3px; color:#aaa;">🔮 Memory: <span id="current-memory">0</span></div>
            </div>
        </div>

        <div class="zone" style="border-color: var(--champion-color);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="champ-card" id="current-champ-name" style="font-size: 13px; font-weight: bold;">尚未覺醒 (Lv 0)</div>
                <button class="btn" style="background-color: var(--material-color); color: white; padding: 5px 10px; font-size: 12px;" onclick="openMaterialModal()">Material Deck</button>
            </div>
        </div>

        <div class="zone">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>3. 你的手牌</h3>
                <button class="btn" style="background: #ff9800;" onclick="endPlayerTurn()">🛑 結束回合</button>
            </div>
            <div class="card-display-container" id="player-hand-display">
                <span style="color:#666; font-size:12px;">尚未開始遊戲</span>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="playerDrawCard()">抽一張牌 (Main: <span id="main-count">0</span>)</button>
            </div>
        </div>

        <div class="zone" style="border-color: var(--memory-color);">
            <h3>🔮 回憶區 (Memory Zone)</h3>
            <div class="card-display-container" id="memory-zone-display"><span style="color:#666; font-size:12px;">空</span></div>
        </div>

        <div class="zone">
            <h3>遊戲歷程</h3>
            <div class="log-box" id="game-log">系統提示：請解析牌組後點擊開始。</div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeMaterialModal()"></div>
    <div class="modal" id="material-modal">
        <h3 style="color: var(--material-color); margin: 0;">選擇要升級的卡片</h3>
        <div class="modal-list" id="material-list-container"></div>
        <button class="btn" style="background:#555; color:#fff; width:100%; margin-top:10px;" onclick="closeMaterialModal()">關閉</button>
    </div>

    <script>
        // --- 1. 卡牌數據庫 ---
        const cardDatabase = {
            "Spirit of Water": { name: "Spirit of Water", cost: 0, type: "Spirit", level: 0 },
            "Alice, Golden Queen": { name: "Alice, Golden Queen", cost: 1, type: "Champion", level: 1 },
            "Alice, Whim's Monarch": { name: "Alice, Whim's Monarch", cost: 1, type: "Champion", level: 2 },
            "Alice, Trifle's Royalty": { name: "Alice, Trifle's Royalty", cost: 1, type: "Champion", level: 3 },
            "Castling": { name: "Castling", cost: 1, type: "Skill", power: 0 },
            "Golden Pawn": { name: "Golden Pawn", cost: 0, type: "Ally", power: 1 },
            "Song of Frost": { name: "Song of Frost", cost: 2, type: "Spell", power: 4 },
            "Golden Checkmate": { name: "Golden Checkmate", cost: 3, type: "Attack", power: 6 },
            // AI 專用卡池
            "AI_Attack_Small": { name: "暗影抓擊", cost: 0, type: "Attack", power: 2 },
            "AI_Attack_Big": { name: "巨龍吐息", cost: 0, type: "Attack", power: 5 }
        };

        // --- 2. 遊戲狀態變數 ---
        let mainDeck = [];
        let materialDeck = [];
        let playerHand = [];
        let memoryZone = [];
        let currentMemory = 0;
        
        // AI 狀態
        let aiDeck = [];
        let aiHand = [];
        let aiHP = 30;
        let playerHP = 30;
        
        let isPlayerTurn = true; // 是否輪到玩家的回合
        const logBox = document.getElementById('game-log');

        function log(msg) {
            logBox.innerHTML += `<br>> ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- 3. 牌組匯入與初始化 ---
        function importDeck() {
            const text = document.getElementById('deck-input').value.trim();
            if (!text) { alert('請先貼入文字列表！'); return; }
            mainDeck = []; materialDeck = [];
            let currentMode = "";
            text.split('\n').forEach(line => {
                let trimmed = line.trim();
                if (!trimmed) return;
                if (trimmed.startsWith('# Material Deck')) { currentMode = "material"; return; }
                if (trimmed.startsWith('# Main Deck')) { currentMode = "main"; return; }
                let match = trimmed.match(/^(\d+)\s+(.+)$/);
                if (match) {
                    let count = parseInt(match[1], 10);
                    let cardName = match[2].trim();
                    for (let i = 0; i < count; i++) {
                        if (currentMode === "main") mainDeck.push(cardName);
                        else if (currentMode === "material") materialDeck.push(cardName);
                    }
                }
            });
            document.getElementById('main-count').innerText = mainDeck.length;
            log(`成功匯入！主牌組共 ${mainDeck.length} 張。`);
        }

        function startGame() {
            if (mainDeck.length === 0) { alert('請先載入牌組！'); return; }
            mainDeck.sort(() => Math.random() - 0.5);
            playerHand = []; memoryZone = []; currentMemory = 0;
            playerHP = 30; aiHP = 30; isPlayerTurn = true;
            
            // 初始化模擬的 AI 牌組
            aiDeck = ["AI_Attack_Small", "AI_Attack_Small", "AI_Attack_Big", "AI_Attack_Small", "AI_Attack_Big"];
            aiDeck.sort(() => Math.random() - 0.5);
            aiHand = [];

            document.getElementById('player-hp').innerText = playerHP;
            document.getElementById('ai-hp').innerText = aiHP;
            document.getElementById('ai-deck-count').innerText = aiDeck.length;
            document.getElementById('current-champ-name').innerText = "尚未覺醒 (Lv 0)";
            
            updateHandUI(); updateMemoryUI();
            log('⚔️ 遊戲開始！這是【你的回合】。請抽牌或進行回憶轉換。');
        }

        function playerDrawCard() {
            if (!isPlayerTurn) { log('❌ 現在是 AI 的回合，你不能抽牌！'); return; }
            if (mainDeck.length === 0) return;
            playerHand.push(mainDeck.pop());
            document.getElementById('main-count').innerText = mainDeck.length;
            updateHandUI();
        }

        function buryToMemory(handIndex) {
            if (!isPlayerTurn) { log('❌ 現在是 AI 的回合！'); return; }
            let cardKey = playerHand.splice(handIndex, 1)[0];
            memoryZone.push(cardKey);
            currentMemory += 1;
            updateHandUI(); updateMemoryUI();
            log(`🔮 [${cardKey}] 轉為回憶。可用 Memory: ${currentMemory}`);
        }

        function playCard(handIndex) {
            if (!isPlayerTurn) { log('❌ 現在是 AI 的回合！'); return; }
            let cardKey = playerHand[handIndex];
            let card = cardDatabase[cardKey] || { name: cardKey, cost: 1, type: "Attack", power: 2 };

            if (currentMemory < card.cost) {
                alert(`⚠️ Memory 不足！需要 ${card.cost} 點。`);
                return;
            }

            currentMemory -= card.cost;
            playerHand.splice(handIndex, 1);
            log(`🔥 你打出了 [${card.name}]！`);
            
            if (card.power > 0) {
                aiHP -= card.power;
                if (aiHP < 0) aiHP = 0;
                document.getElementById('ai-hp').innerText = aiHP;
                log(`⚔️ 對 AI 造成 ${card.power} 點傷害！AI 剩餘血量: ${aiHP}`);
                if (aiHP === 0) log('🎉 你擊敗了 AI！贏得勝利！');
            }
            updateHandUI(); updateMemoryUI();
        }

        // --- 4. 核心功能：結束回合與 AI 反擊機制 ---
        function endPlayerTurn() {
            if (!isPlayerTurn) return;
            if (aiHP === 0 || playerHP === 0) return;
            
            isPlayerTurn = false;
            log('🛑 你結束了回合。');
            
            // 延遲 1 秒執行 AI 行動，模擬真實對戰的思考感，在手機上體驗更好
            setTimeout(aiTurnAction, 1000);
        }

        function aiTurnAction() {
            log('🤖 【AI 的回合】開始...');
            
            // A. AI 抽牌
            if (aiDeck.length > 0) {
                let drawn = aiDeck.pop();
                aiHand.push(drawn);
                document.getElementById('ai-deck-count').innerText = aiDeck.length;
                log(`🤖 AI 抽了一張牌。`);
            }

            // B. AI 決定是否出牌 (這裡設計 75% 機率會隨機打出手中一張牌)
            if (aiHand.length > 0 && Math.random() < 0.75) {
                let cardIndex = Math.floor(Math.random() * aiHand.length);
                let cardKey = aiHand.splice(cardIndex, 1)[0];
                let card = cardDatabase[cardKey];

                log(`💥 AI 從手牌打出了：[${card.name}]！`);
                if (card.power > 0) {
                    playerHP -= card.power;
                    if (playerHP < 0) playerHP = 0;
                    document.getElementById('player-hp').innerText = playerHP;
                    log(`🩸 你受到了 ${card.power} 點傷害！你剩餘血量: ${playerHP}`);
                    
                    if (playerHP === 0) {
                        log('💀 你被 AI 擊敗了！遊戲結束。');
                        return;
                    }
                }
            } else {
                log(`🤖 AI 選擇保留手牌，不進行攻擊。`);
            }

            // C. AI 回合結束，還給玩家
            setTimeout(() => {
                isPlayerTurn = true;
                log('🟢 【你的回合】開始！可以繼續抽牌出牌。');
            }, 1000);
        }

        // --- 5. Material 升級與 UI 渲染 ---
        function openMaterialModal() {
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('material-modal').style.display = 'block';
            const container = document.getElementById('material-list-container');
            if (materialDeck.length === 0) { container.innerHTML = '<div>Material 空了</div>'; return; }
            container.innerHTML = materialDeck.map((cardKey, index) => {
                let card = cardDatabase[cardKey] || { name: cardKey, cost: 1, level: 1 };
                return `
                    <div class="modal-item">
                        <div><b>${card.name}</b> (Lv.${card.level})</div>
                        <button class="btn" style="padding:4px 8px; font-size:11px;" onclick="levelUpHero(${index})">召喚 (${card.cost})</button>
                    </div>
                `;
            }).join('');
        }

        function closeMaterialModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('material-modal').style.display = 'none';
        }

        function levelUpHero(index) {
            let cardKey = materialDeck[index];
            let card = cardDatabase[cardKey] || { name: cardKey, cost: 1, level: 1 };
            if (currentMemory < card.cost) { alert('資源不足！'); return; }
            currentMemory -= card.cost;
            materialDeck.splice(index, 1);
            document.getElementById('current-champ-name').innerText = `${card.name} (Lv.${card.level})`;
            closeMaterialModal(); updateMemoryUI();
            log(`👑 英雄升級為：[${card.name}] (Lv.${card.level})`);
        }

        function updateHandUI() {
            const container = document.getElementById('player-hand-display');
            if (playerHand.length === 0) { container.innerHTML = '<span style="color:#666; font-size:12px;">手牌空了</span>'; return; }
            container.innerHTML = playerHand.map((cardKey, index) => {
                let card = cardDatabase[cardKey] || { name: cardKey, cost: 1, type: "Attack", power: 2 };
                return `
                    <div class="card-item">
                        <div class="card-cost">🔮${card.cost}</div>
                        <div class="card-name">${card.name}</div>
                        <div class="card-stats">DMG: ${card.power} (${card.type})</div>
                        <button class="card-action-btn" style="background:#4caf50;" onclick="playCard(${index})">🔥 打出</button>
                        <button class="card-action-btn" onclick="buryToMemory(${index})">回憶</button>
                    </div>
                `;
            }).join('');
        }

        function updateMemoryUI() {
            document.getElementById('current-memory').innerText = currentMemory;
            const container = document.getElementById('memory-zone-display');
            if (memoryZone.length === 0) { container.innerHTML = '<span style="color:#666; font-size:12px;">空</span>'; return; }
            container.innerHTML = memoryZone.map((cardKey) => {
                return `<div style="background:#111; border:1px solid var(--memory-color); padding:2px 5px; border-radius:4px; font-size:10px;">${cardKey}</div>`;
            }).join(' ');
        }


        // 註冊 PWA Service Worker
        if ('serviceWorker' in navigator) {
           window.addEventListener('load', () => {
               navigator.serviceWorker.register('./sw.js')
                  .then(reg => console.log('PWA 註冊成功！', reg))
                  .catch(err => console.log('PWA 註冊失敗：', err));
            });
        }
    </script>
</body>
</html>
